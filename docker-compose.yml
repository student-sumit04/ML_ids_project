services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      IDS_ENABLE_RF: "0"
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./:/app
    depends_on:
      - backend
